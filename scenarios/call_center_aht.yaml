ground_truth:
  mean: 426.5
  std: 90.3
  Ppk: 0.641
  Pp: 0.665
  expected_ppm_out_of_spec: 46684.0
  capable_at_1_33: false
  observed_out_of_spec: 2
  baseline_sigma_level: 3.14
expected_findings:
- 'Process is NOT capable: Ppk is far below the 1.33 threshold (and below 1.0).'
- The stakeholder's Ppk ~ 1.5 claim is contradicted by the data.
- A material share of calls fall outside the 240-600s specification.
