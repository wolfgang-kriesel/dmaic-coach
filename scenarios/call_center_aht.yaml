id: call_center_aht
title: "Call-Center Average Handle Time (AHT) \u2014 Measure phase"
stakeholder:
  name: Maria Lindqvist
  role: Process Owner, Customer Support
  voice: Pragmatic, time-pressured, a little defensive about her team's numbers.
  claim_ppk: 1.5
  claim_text: "Honestly, our handle time is fine. Last I heard capability was around Ppk 1.5\
    \ \u2014 comfortably within target. Do we really need to remeasure?"
briefing: We promise customers an Average Handle Time (AHT) between 240 and 600 seconds, with
  an internal target of 420. Here is a sample of 40 calls pulled across operators and shifts.
  Tell me whether we are capable.
